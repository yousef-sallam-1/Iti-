  <link rel="stylesheet" href="style.css">

<body>
  <div>
    <h1> PIZZAa ORDER </h1>

    <fieldset>
      <legend>YOUR INFOMATION</legend>

      <label>NAME:</label>
      <input type="text">
      <br>

      <label>ADDRESS:</label>
      <input type="text">
      <br>

      <label>PHONE NUMBER :</label>
      <input type="number">
      <br>

      <label>EMAIL :</label>
      <input type="text">
      <br>

      <label>DELIVREY INSTRUCTION :</label>
      <input type="text">
      <br>

    </fieldset>
  </div>

  <div>

    <h2>Design Your Dream Pizza:</h2>

    <fieldset>
      <legend>Pizza specs</legend>

      <fieldset>

        <input type="radio" name="crust"> Classic White <br>

        <input type="radio" name="crust"> Cheese-stuffed crust <br>
        <input type="radio" name="crust"> Gluten-free <br>
      </fieldset>

      <br>
  </div>

  <div>
    <fieldset>
      <legend>choose size</legend>
      <input type="radio" name="size">SMALL <br>
      <input type="radio" name="size">MID   <br>
      <input type="radio" name="size">LARGE <br>
    </fieldset>
  </div>
  <br>

  <div>
    <fieldset>
      <legend>NUMBER</legend>
      <label >HOW MANY PIZZAS :</label>
      <input type="number">
    </fieldset>
